<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>5° anniversario amore mio ❤</title>
  <style>
    :root{
      --cream:#fff7ed; --rose:#fb7185; --pink:#f472b6; --wine:#831843; --green:#2f6b4f; --dark:#1f2937;
      --glass: rgba(255,255,255,.78); --shadow: 0 24px 70px rgba(31,41,55,.22);
    }
    *{box-sizing:border-box} html,body{height:100%; margin:0; font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--dark)}
    body{overflow:hidden; background:linear-gradient(180deg,#dff3ff 0%,#fff2f8 48%,#f9fafb 100%)}
    .mountains{position:fixed; inset:0; z-index:-3; overflow:hidden; background:radial-gradient(circle at 50% 8%, rgba(255,255,255,.95) 0 13%, transparent 20%), linear-gradient(180deg,#dff3ff 0%,#e8f8ff 38%,#e9f7ec 100%)}
    .mountains:before{content:""; position:absolute; inset:0; background:linear-gradient(140deg,transparent 0 50%,rgba(255,255,255,.8) 50% 58%,transparent 58%), linear-gradient(215deg,transparent 0 47%,rgba(255,255,255,.7) 47% 58%,transparent 58%); clip-path:polygon(0 63%,18% 35%,34% 62%,50% 26%,70% 65%,88% 38%,100% 62%,100% 100%,0 100%); background-color:#7aa779; opacity:.65}
    .mountains:after{content:""; position:absolute; left:-10%; right:-10%; bottom:-5%; height:42%; background:radial-gradient(circle at 18% 70%, #2f6b4f 0 7%, transparent 8%),radial-gradient(circle at 30% 75%, #386f54 0 9%, transparent 10%),radial-gradient(circle at 45% 68%, #2f6b4f 0 8%, transparent 9%),radial-gradient(circle at 66% 73%, #3f7c5f 0 9%, transparent 10%),radial-gradient(circle at 80% 70%, #2f6b4f 0 8%, transparent 9%),linear-gradient(180deg,transparent,#d7ead6 22%,#a6c58f 100%); opacity:.9}
    .app{height:100%; display:grid; place-items:center; padding:20px}
    .card{width:min(920px,100%); max-height:92vh; overflow:auto; background:var(--glass); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.7); border-radius:32px; padding:clamp(22px,5vw,52px); box-shadow:var(--shadow); text-align:center; animation:pop .45s ease both; position:relative}
    @keyframes pop{from{opacity:0; transform:translateY(18px) scale(.98)}to{opacity:1; transform:none}}
    h1{font-size:clamp(2rem,8vw,4.8rem); line-height:1.03; color:var(--wine); margin:0 0 18px} h2{font-size:clamp(1.8rem,7vw,4rem); color:var(--wine); margin:0 0 18px}.lead{font-size:clamp(1.25rem,4vw,2.2rem); line-height:1.35; font-weight:800; color:#7f1d1d}.small{font-size:1rem; opacity:.75}.photo{width:100%; max-width:620px; max-height:56vh; object-fit:cover; border-radius:26px; box-shadow:0 18px 44px rgba(0,0,0,.22); border:8px solid rgba(255,255,255,.72); margin-top:18px}.photo.tall{max-width:480px}.btn{appearance:none; border:0; border-radius:999px; padding:15px 25px; margin:18px 8px 0; background:linear-gradient(135deg,var(--rose),var(--pink)); color:white; font-weight:900; font-size:1.05rem; cursor:pointer; box-shadow:0 12px 24px rgba(244,114,182,.35); transition:.18s transform,.18s filter}.btn:hover{transform:translateY(-2px); filter:saturate(1.15)}.ghost{background:rgba(255,255,255,.75); color:var(--wine); border:1px solid rgba(131,24,67,.14)}.options{display:grid; gap:14px; max-width:660px; margin:24px auto 0}.option{border:2px solid rgba(131,24,67,.15); background:rgba(255,255,255,.82); border-radius:20px; padding:17px 20px; font-size:clamp(1.05rem,3vw,1.35rem); font-weight:850; cursor:pointer; text-align:left; transition:.18s}.option:hover{transform:translateX(4px); border-color:var(--pink); background:#fff}.error{min-height:34px; margin-top:16px; font-weight:900; color:#be123c; font-size:1.15rem}.shake{animation:shake .35s ease}@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}.topbar{position:fixed; top:12px; left:12px; right:12px; display:flex; justify-content:space-between; align-items:center; z-index:5; pointer-events:none}.pill{pointer-events:auto; background:rgba(255,255,255,.7); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.8); padding:10px 14px; border-radius:999px; font-weight:900; color:var(--wine); box-shadow:0 8px 24px rgba(0,0,0,.08)}.hearts{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:-1}.heart{position:absolute; bottom:-40px; font-size:28px; animation:float 5.5s linear forwards; opacity:.75}@keyframes float{to{transform:translateY(-110vh) rotate(22deg); opacity:0}}.grid4{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; margin-top:22px}.spoiler{background:#fff; border-radius:24px; padding:10px; box-shadow:0 14px 32px rgba(0,0,0,.12)}.spoiler svg{width:100%; height:220px; display:block; border-radius:18px}.calendar svg{max-width:560px; width:100%; border-radius:24px; box-shadow:0 14px 34px rgba(0,0,0,.16); background:white}.secretInput{width:min(520px,100%); padding:16px 18px; border-radius:999px; border:2px solid rgba(131,24,67,.18); background:rgba(255,255,255,.9); font-size:1.08rem; text-align:center; font-weight:850; outline:none; box-shadow:0 10px 26px rgba(244,114,182,.12)}.secretInput:focus{border-color:var(--pink); box-shadow:0 0 0 6px rgba(244,114,182,.18)}.bigLove{font-size:clamp(3rem,14vw,8rem); line-height:.9; margin:14px 0 10px; font-weight:1000; letter-spacing:.02em; color:#be123c; text-shadow:0 8px 24px rgba(244,114,182,.35); animation:lovePulse 1.4s ease-in-out infinite alternate}.finalSparkle{position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:32px}.spark{position:absolute; font-size:24px; animation:sparkle 1.6s ease-out forwards}@keyframes lovePulse{from{transform:scale(.96); filter:saturate(1)}to{transform:scale(1.04); filter:saturate(1.5)}}@keyframes sparkle{0%{transform:translateY(20px) scale(.4) rotate(0deg); opacity:0}30%{opacity:1}100%{transform:translateY(-130px) scale(1.25) rotate(30deg); opacity:0}}@media(max-width:680px){.grid4{grid-template-columns:1fr}.card{border-radius:24px}.spoiler svg{height:190px}.topbar{top:8px}.pill{font-size:.85rem}.photo{max-height:48vh}}
  
.date-fixed {
  position: fixed;
  top: 15px;
  right: 20px;
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.8);
  padding: 8px 14px;
  border-radius: 999px;
  font-weight: 900;
  color: #831843;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
  z-index: 9999;
  font-size: 14px;
  animation: fadeInDate 1.2s ease;
}

@keyframes fadeInDate {
  from {opacity:0; transform: translateY(-10px);}
  to {opacity:1; transform: translateY(0);}
}

</style>
</head>
<body>
<div class="date-fixed">4 maggio 2026</div>
<div class="mountains"></div><div class="hearts" id="hearts"></div>
<div class="topbar"><div class="pill" id="counter">5° anniversario ❤</div><button class="pill" id="musicBtn">🎵 musica</button></div>
<main class="app"><section class="card" id="card"></section></main>
<script>
const slides=[
{type:'text',title:'5° anniversario amore mio ❤',text:'Buongiorno Lindi❤, benvenuta in questo misterioso viaggio alla scoperta del tuo regalo. Per scoprire di cosa si tratta dovrai rispondere a qualche domanda. Buon divertimento',btn:'Inizia il viaggio'},
{type:'text',text:'Innanzitutto, chi?'},
{type:'quiz',q:'In che anno ci siamo conosciuti?',opts:['2017','2018','2019','2020'],a:1},
{type:'image',text:'Noi due, ovviamente 💑',img:'assets/foto1.jpg'},
{type:'text',text:'Okay, ma cosa?'},
{type:'quiz',q:'Dove siamo andati per la prima volta in vacanza insieme?',opts:['Tesero','Cavalese','Chiusa','Velturno'],a:3},
{type:'image',text:'Che te lo dico a fa? 😏',img:'assets/foto2.jpg'},
{type:'image',text:'Sto scherzando, ci sei cascata 😂 Ecco cosa faremo',img:'assets/foto3.jpg'},
{type:'text',text:'Si, ma quando?'},
{type:'quiz',q:'Dove abbiamo trovato insieme il mio primo porcino?',opts:['Piazzatorre','Valgoglio','Colle di Ranica','Passo della presolana'],a:0},
{type:'calendar',text:'Esattoooooo'},
{type:'text',text:'Si ok, tutto molto bello, ma dove andiamo?'},
{type:'quiz',q:'Qual è il nostro cibo preferito?',opts:['Pasta con le cozze','Sushi 🤮','Pizza','Kebab'],a:2},
{type:'spoilers',text:'Va be dai, questa era facile. Ma non ti dirò dove andiamo, devi fidarti 😜. Solo qualche piccolo spoiler'},
{type:'text',text:"Cosa prevede l'experience?"},
{type:'quiz',q:'Come si chiama il nostro simpatico polletto bianco autistico? (vediamo se sei stata attenta)',opts:['Tony','Bruno','Ugo','Oscar'],a:0},
{type:'image',text:'Esattoooo, è proprio lui',img:'assets/foto4.jpg'},
{type:'text',text:'Tanti chilometri in mezzo a paesaggi spettacolari, relax, coccole, buon cibo e tanto tanto amore ❤ Penserò a tutto io, tu dovrai solo goderti il viaggio e la vacanza'},
{type:'image',text:'Siamo giunti al termine di questo viaggio. Buon anniversario amore mio, grazie per questi splendidi 5 anni insieme, ti amo ❤',img:'assets/foto5.jpg',final:true}
];
let unlocked=false; let i=0; const card=document.getElementById('card'), counter=document.getElementById('counter');
function go(n){i=n; render(); if(n%2===0) burst(4)} function next(){go(Math.min(i+1,slides.length-1))}
function render(){if(!unlocked){counter.textContent='Porta segreta 💖'; card.classList.remove('shake'); card.innerHTML=`<h1>5° anniversario amore mio ❤</h1><p class="lead">Inserisci la parola segreta 💖<br>Che animaletto sei tu?</p><input id="secret" class="secretInput" type="text" autocomplete="off" placeholder="scrivi qui la risposta segreta"><br><button class="btn" onclick="checkPassword()">Entra ❤</button><div class="error" id="secretErr"></div>`; setTimeout(()=>document.getElementById('secret')?.focus(),50); document.getElementById('secret').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword()}); return;} const s=slides[i]; counter.textContent=`${i+1}/${slides.length} · 5° anniversario ❤`; card.classList.remove('shake'); let html='';
 if(s.type==='text') html=`${s.title?`<h1>${s.title}</h1>`:''}<p class="lead">${s.text}</p><button class="btn" onclick="next()">${s.btn||'Continua ❤'}</button>`;
 if(s.type==='image') html=s.final?`<div class="finalSparkle" id="finalSparkle"></div><div class="bigLove">TI AMO</div><h2>${s.text}</h2><img class="photo" src="${s.img}" alt="foto ricordo"><br><button class="btn" onclick="restart()">Ricomincia ❤</button>`:`<h2>${s.text}</h2><img class="photo ${i===17?'':'tall'}" src="${s.img}" alt="foto ricordo"><br><button class="btn" onclick="next()">Continua ❤</button>`;
 if(s.type==='quiz') html=`<h2>${s.q}</h2><div class="options">${s.opts.map((o,k)=>`<button class="option" onclick="answer(${k})"><b>${String.fromCharCode(97+k)})</b> ${o}</button>`).join('')}</div><div class="error" id="err"></div>`;
 if(s.type==='calendar') html=`<h2>${s.text}</h2><div class="calendar">${calendarSvg()}</div><button class="btn" onclick="next()">Continua ❤</button>`;
 if(s.type==='spoilers') html=`<h2>${s.text}</h2><div class="grid4">${spoilerSvgs().map(x=>`<div class="spoiler">${x}</div>`).join('')}</div><button class="btn" onclick="next()">Continua ❤</button>`;
 card.innerHTML=html; card.scrollTop=0; if(s.final){burst(30); finalSparkles(); if(navigator.vibrate) navigator.vibrate([90,60,90]);} }
function checkPassword(){const v=(document.getElementById('secret')?.value||'').trim().toLowerCase().replace(/\s+/g,' '); if(v==='un piccolo ratto di fogna'){unlocked=true; burst(18); render()} else {document.getElementById('secretErr').textContent='No no 😏 riprova'; card.classList.add('shake'); if(navigator.vibrate) navigator.vibrate(140); setTimeout(()=>card.classList.remove('shake'),380)}}
function answer(k){const s=slides[i]; if(k===s.a){burst(10); next()} else {document.getElementById('err').textContent='Noooo amo, impegnati di più 😭'; card.classList.add('shake'); if(navigator.vibrate) navigator.vibrate(140); setTimeout(()=>card.classList.remove('shake'),380)}}
function restart(){go(0); burst(18)}
function finalSparkles(){const box=document.getElementById('finalSparkle'); if(!box)return; for(let j=0;j<34;j++){const sp=document.createElement('div'); sp.className='spark'; sp.textContent=['✨','💖','🎉','❤'][Math.floor(Math.random()*4)]; sp.style.left=Math.random()*100+'%'; sp.style.top=(35+Math.random()*55)+'%'; sp.style.animationDelay=(Math.random()*1.2)+'s'; sp.style.fontSize=(18+Math.random()*24)+'px'; box.appendChild(sp); setTimeout(()=>sp.remove(),2600)}}
function burst(n=8){for(let j=0;j<n;j++){const h=document.createElement('div'); h.className='heart'; h.textContent=['❤','💗','💘','💞'][Math.floor(Math.random()*4)]; h.style.left=Math.random()*100+'%'; h.style.animationDelay=(Math.random()*1.2)+'s'; h.style.fontSize=(20+Math.random()*24)+'px'; document.getElementById('hearts').appendChild(h); setTimeout(()=>h.remove(),6500)}}
function calendarSvg(){return `<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg"><rect width="700" height="520" rx="32" fill="#fff7ed"/><rect width="700" height="105" rx="32" fill="#fb7185"/><text x="350" y="70" text-anchor="middle" font-size="44" font-weight="900" fill="white">GIUGNO 2026</text><g font-family="system-ui" font-size="22" font-weight="800" fill="#831843" text-anchor="middle"><text x="75" y="145">Lun</text><text x="166" y="145">Mar</text><text x="257" y="145">Mer</text><text x="348" y="145">Gio</text><text x="439" y="145">Ven</text><text x="530" y="145">Sab</text><text x="621" y="145">Dom</text></g>${Array.from({length:30},(_,d)=>{let day=d+1,col=d%7,row=Math.floor(d/7);let x=75+col*91,y=195+row*67;let circ=(day===15||day===16)?`<ellipse cx="${x}" cy="${y-8}" rx="39" ry="31" fill="none" stroke="#ef4444" stroke-width="7" transform="rotate(${day===15?-10:8} ${x} ${y-8})"/>`:'';return `${circ}<text x="${x}" y="${y}" text-anchor="middle" font-size="31" font-weight="900" fill="#1f2937">${day}</text>`}).join('')}<text x="350" y="485" text-anchor="middle" font-size="24" font-weight="900" fill="#831843">Due giorni tutti nostri ❤</text></svg>`}
function spoilerSvgs(){return [
`<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="a" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#c7e9ff"/><stop offset="1" stop-color="#dff6dd"/></linearGradient></defs><rect width="400" height="260" fill="url(#a)"/><path d="M0 205 L85 105 L160 205 L245 88 L400 205 Z" fill="#7aa779"/><path d="M155 172 C178 115 205 110 224 170 L236 236 L142 236 Z" fill="#efe6d0" stroke="#9f8f74" stroke-width="5"/><path d="M175 137 L210 137 L197 116 L185 116 Z" fill="#4b5563"/><rect x="0" y="215" width="400" height="45" fill="#7cc0d8" opacity=".75"/><text x="200" y="245" text-anchor="middle" font-size="18" font-weight="800" fill="#1f2937">un campanile quasi nascosto...</text></svg>`,
`<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="260" fill="#1f2937"/><ellipse cx="200" cy="80" rx="120" ry="58" fill="#b9e6ff"/><path d="M0 260 C60 120 140 115 190 260 Z" fill="#4b5563"/><path d="M400 260 C325 105 250 100 205 260 Z" fill="#374151"/><path d="M205 72 C188 112 214 127 195 165 C185 185 206 205 190 242" fill="none" stroke="#e0f2fe" stroke-width="16" stroke-linecap="round"/><path d="M0 235 C90 210 245 215 400 232 L400 260 L0 260 Z" fill="#67e8f9" opacity=".6"/></svg>`,
`<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="260" fill="#dbeafe"/><path d="M0 170 L90 70 L165 170 L250 55 L400 170 Z" fill="#94a3b8"/><path d="M0 260 L400 260 L400 165 C310 190 225 176 110 198 C65 206 30 190 0 205 Z" fill="#86a36d"/><path d="M120 178 h165 v62 h-165z" fill="#8b5e34"/><path d="M105 180 L200 115 L300 180 Z" fill="#6b3f22"/><path d="M145 184 h108 v56 h-108z" fill="#f3e1bd"/><path d="M170 222 C175 185 225 185 230 222 Z" fill="#111827"/><path d="M205 197 C235 178 260 165 290 150" stroke="#d97706" stroke-width="5" fill="none"/></svg>`,
`<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="260" fill="#fef3c7"/><path d="M45 210 V112 L84 112 V90 H115 V112 H155 V90 H187 V112 H228 V90 H260 V112 H303 V90 H335 V112 H355 V210 Z" fill="#d6a76c" stroke="#8b5e34" stroke-width="6"/><path d="M92 210 V158 h55 v52 M250 210 v-58 h55 v58" fill="#f8e0b5" stroke="#8b5e34" stroke-width="5"/><path d="M168 210 v-70 h64 v70" fill="#7c2d12"/><circle cx="200" cy="155" r="12" fill="#fef3c7"/><path d="M35 215 h330" stroke="#8b5e34" stroke-width="8"/><text x="200" y="43" text-anchor="middle" font-size="22" font-weight="900" fill="#7c2d12">un piccolo borgo tra le mura</text></svg>`]}
let audioCtx=null, nodes=[]; document.getElementById('musicBtn').onclick=()=>{if(audioCtx){nodes.forEach(n=>n.stop&&n.stop()); audioCtx.close(); audioCtx=null; nodes=[]; musicBtn.textContent='🎵 musica'; return} audioCtx=new (window.AudioContext||window.webkitAudioContext)(); const gain=audioCtx.createGain(); gain.gain.value=.045; gain.connect(audioCtx.destination); [261.63,329.63,392.00].forEach((f,idx)=>{const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.value=f; g.gain.value=.35; o.connect(g); g.connect(gain); o.start(audioCtx.currentTime+idx*.08); nodes.push(o)}); musicBtn.textContent='⏸ pausa musica'};
render(); setInterval(()=>burst(1),2600);
</script></body></html>
